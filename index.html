<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>小课超市</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: #f5f5f5;
      min-height: 100vh;
      padding: 16px;
    }

    .container {
      max-width: 414px;
      margin: 0 auto;
    }

    h1 {
      font-size: 20px;
      color: #333;
      margin-bottom: 16px;
      text-align: center;
    }

    .card-list {
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    .card {
      background: #fff;
      border-radius: 12px;
      box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
      overflow: hidden;
      cursor: pointer;
      transition: transform 0.2s, box-shadow 0.2s;
      text-decoration: none;
      display: block;
    }

    .card:hover {
      transform: translateY(-4px);
      box-shadow: 0 4px 16px rgba(0, 0, 0, 0.15);
    }

    .card:active {
      transform: translateY(-2px);
    }

    .card-cover {
      width: 100%;
      height: 180px;
      object-fit: cover;
      display: block;
      background: #e0e0e0;
    }

    .card-content {
      padding: 14px 16px;
    }

    .card-title {
      font-size: 17px;
      font-weight: 700;
      color: #333;
      margin-bottom: 8px;
    }

    /* 描述和按钮同一行 */
    .card-info-row {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 8px;
    }

    .card-desc {
      font-size: 15px;
      color: #777;
      line-height: 1.5;
      flex: 1;
    }

    /* 红色引导按钮 */
    .btn-guide {
      flex-shrink: 0;
      display: inline-block;
      background: #ff4757;
      color: #fff;
      font-size: 14px;
      font-weight: 600;
      padding: 6px 16px;
      border-radius: 20px;
      white-space: nowrap;
      letter-spacing: 1px;
      box-shadow: 0 2px 8px rgba(255, 71, 87, 0.4);
      animation: pulse 2s ease-in-out infinite;
      margin-top: 2px;
    }

    @keyframes pulse {
      0%, 100% {
        transform: scale(1);
        box-shadow: 0 2px 8px rgba(255, 71, 87, 0.4);
      }
      50% {
        transform: scale(1.05);
        box-shadow: 0 4px 16px rgba(255, 71, 87, 0.6);
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>🛒 课程上新</h1>
    <div class="card-list" id="cardList"></div>
  </div>

  <script>
    // ⭐ 课程数据
    const courses = [
      {
        id: 1,
        title: "国债入门课",
        desc: "小白学国债，1节课搞懂闲钱配置技巧",
        coverImg: "./images/course_1.png",
        link: "https://s.wacai.com/asrI83"
      },
      {
        id: 2,
        title: "股票入门课",
        desc: "零基础学K线，1节课看懂股票走势图",
        coverImg: "./images/course_2.jpg",
        link: "https://s.wacai.com/uhbcJk"
      }
    ];

    function renderCards() {
      const list = document.getElementById("cardList");
      list.innerHTML = courses.map(course => `
        <a href="${course.link}" target="_blank" rel="noopener noreferrer" 
           class="card"
           onclick="_hmt.push(['_trackEvent', '课程卡片', '点击', '${course.title}'])">
          <img 
            class="card-cover" 
            src="${course.coverImg}" 
            alt="${course.title}封面"
            onerror="this.style.display='none'"
          />
          <div class="card-content">
            <div class="card-title">${course.title}</div>
            <div class="card-info-row">
              <div class="card-desc">${course.desc}</div>
              <span class="btn-guide">点这领课</span>
            </div>
          </div>
        </a>
      `).join("");
    }

    renderCards();
  </script>

  <!-- 百度统计代码 -->
  <script>
    var _hmt = _hmt || [];
    (function() {
      var hm = document.createElement("script");
      hm.src = "https://hm.baidu.com/hm.js?xxxxxxxxxxxxxxxxxxxx";  // ← 记得换成你的ID
      var s = document.getElementsByTagName("script")[0]; 
      s.parentNode.insertBefore(hm, s);
    })();
  </script>
</body>
</html>
